[env:uno]
platform = atmelavr
board = uno
framework = arduino
lib_deps = 
	adafruit/Adafruit SSD1306@^2.5.16
	arduino-libraries/Stepper@^1.1.3
	paulstoffregen/OneWire@^2.3.8
	milesburton/DallasTemperature@^4.0.6
